      <p>Натисніть на одну з позначок на карті, щоб перейти на відповідний популярний сайт.</p>

      <map name="popular-sites-map">

          shape="circle"
          coords="170,130,46"

          alt="Google"
          target="_blank"
          rel="noopener noopener" />
        <area
          shape="circle"
          coords="390,110,46"
          href="https://www.youtube.com"
          alt="YouTube"
          target="_blank"
          rel="noopener noopener" />
        <area
          shape="circle"
          coords="610,130,46"
          href="https://www.wikipedia.org"
          alt="Wikipedia"
          target="_blank"
          rel="noopener noopener" />
        <area
          shape="circle"
          coords="280,285,46"
          href="https://github.com"
          alt="GitHub"
          target="_blank"
          rel="noopener noopener" />
        <area
          shape="circle"
          coords="510,285,46"
          href="https://stackoverflow.com"
          alt="Stack Overflow"
          target="_blank" />
      </map>

      <p>Кола на зображенні - активні області карти (image map), що реалізовані через тег map/area.</p>
