<!doctype html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ЛР7 - Варіант 8 | Гаврилов Олександр В`ячеславович</title>
  <link rel="stylesheet" href="styles/main.css" />
</head>
<body>
  <main class="card">
    <h1>Лабораторна робота № 7</h1>
    <p class="meta">Студент: Гаврилов Олександр В`ячеславович</p>
    <p class="subtitle">Варіант 8: Форма підписки на освітню платформу</p>

    <form id="subscriptionForm" novalidate>
      <div class="field">
        <label for="name">Ім'я</label>
        <input id="name" name="name" type="text" autocomplete="name" required />
        <div id="nameError" class="error-message"></div>
      </div>

      <div class="field">
        <label for="email">Електронна адреса</label>
        <input id="email" name="email" type="email" autocomplete="email" required />
        <div id="emailError" class="error-message"></div>
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required />
        <div id="passwordError" class="error-message"></div>
      </div>

      <div class="actions">
        <button type="submit">Підписатися</button>
        <div id="formStatus" class="status"></div>
      </div>
    </form>
  </main>

  <script src="scripts/main.js"></script>
</body>
</html>
